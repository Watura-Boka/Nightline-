<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Nightline — Private Chat</title>
<script>
  // Pick a theme before first paint so there's no flash of the wrong look.
  // Runs synchronously on <html> as soon as the parser reaches it.
  (function(){
    var THEMES = ['dusk', 'nightsky', 'meadow'];
    var theme = THEMES[Math.floor(Math.random() * THEMES.length)];
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ================= THEME TOKENS ================= */
  /* Default / fallback = "dusk" (the original purple-and-gold room) */
  :root{
    --bg-1:#1b1a34;
    --bg-2:#3a2148;
    --bg-3:#3a2148;
    --surface:rgba(255,255,255,0.06);
    --surface-strong:rgba(255,255,255,0.10);
    --border:rgba(255,255,255,0.10);
    --gold:#e7b96d;
    --mint:#7fd1a4;
    --lilac:#b9a3e3;
    --text:#f2ede4;
    --text-dim:#8b8db3;
    --radius:18px;
  }

  /* "nightsky" — deep space, moonlight, stars */
  html[data-theme="nightsky"]{
    --bg-1:#060714;
    --bg-2:#12102c;
    --bg-3:#1c1440;
    --surface:rgba(255,255,255,0.055);
    --surface-strong:rgba(255,255,255,0.095);
    --border:rgba(255,255,255,0.12);
    --gold:#f0c987;
    --mint:#8fe3c0;
    --lilac:#b9a3e3;
    --text:#f3f0e8;
    --text-dim:#8b8db3;
  }

  /* "meadow" — late-night hills, grass, low fireflies */
  html[data-theme="meadow"]{
    --bg-1:#050b10;
    --bg-2:#0e2024;
    --bg-3:#173832;
    --surface:rgba(255,255,255,0.055);
    --surface-strong:rgba(255,255,255,0.095);
    --border:rgba(255,255,255,0.12);
    --gold:#e3b56a;
    --mint:#84bf9d;
    --lilac:#aab8d6;
    --text:#eef1e6;
    --text-dim:#8a9690;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Inter',system-ui,sans-serif;
    color:var(--text);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- per-theme sky/background ---------- */
  html[data-theme="dusk"] body,
  html:not([data-theme]) body{
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(231,185,109,0.10), transparent 60%),
      radial-gradient(900px 500px at 100% 110%, rgba(127,209,164,0.08), transparent 55%),
      linear-gradient(160deg, var(--bg-1), var(--bg-2));
  }
  html[data-theme="nightsky"] body{
    background:
      radial-gradient(560px 380px at 84% 6%, rgba(240,201,135,0.16), transparent 62%),
      radial-gradient(900px 620px at 8% 102%, rgba(185,163,227,0.12), transparent 58%),
      radial-gradient(1200px 900px at 50% 35%, rgba(28,20,64,0.55), transparent 72%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
  }
  html[data-theme="meadow"] body{
    background:
      radial-gradient(340px 300px at 14% 10%, rgba(227,181,106,0.14), transparent 65%),
      radial-gradient(700px 420px at 90% 0%, rgba(170,184,214,0.08), transparent 60%),
      linear-gradient(180deg, var(--bg-1) 0%, #0a1a20 45%, var(--bg-2) 78%, var(--bg-3) 100%);
  }

  /* ================= SCENERY (theme-specific decoration) ================= */
  /* Only the elements for the active theme are ever built by JS, so idle
     themes cost zero extra DOM / paint work. */
  #scenery{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;}

  /* --- nightsky bits --- */
  .moon-glow{
    position:absolute;
    top:-120px; right:-80px;
    width:340px; height:340px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(240,201,135,0.22), rgba(240,201,135,0.05) 45%, transparent 70%);
  }
  .star{
    position:absolute;
    border-radius:50%;
    background:#fdfbf3;
    animation:twinkle ease-in-out infinite;
    will-change:opacity, transform;
  }
  @keyframes twinkle{
    0%, 100%{ opacity:var(--min-o); transform:scale(0.85); }
    50%{ opacity:var(--max-o); transform:scale(1); }
  }
  .shooting-star{
    position:absolute;
    height:1.6px;
    border-radius:2px;
    background:linear-gradient(90deg, rgba(253,251,243,0.95), transparent);
    transform-origin:left center;
    will-change:transform, opacity;
  }

  /* --- meadow bits --- */
  .meadow-moon{
    position:absolute;
    top:9%; left:13%;
    width:84px; height:84px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, rgba(238,241,230,0.95), rgba(238,241,230,0.45) 55%, transparent 75%);
    box-shadow:0 0 70px 24px rgba(238,241,230,0.12);
  }
  .mountain-layer, .grass-layer{
    position:absolute;
    bottom:0; left:0;
    width:100%;
    display:block;
  }
  .mountain-far{ height:36%; }
  .mountain-near{ height:24%; }
  .grass-layer{ height:8%; }
  .meadow-firefly{
    position:absolute;
    border-radius:50%;
    background:var(--gold);
    opacity:0;
    animation:drift 14s ease-in-out infinite;
  }

  /* ---------- shared ambient fireflies (all themes) ---------- */
  .fireflies{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  html[data-theme="meadow"] .fireflies{ transform:translateY(10%); }
  .firefly{
    position:absolute;
    width:5px;height:5px;
    border-radius:50%;
    background:var(--gold);
    box-shadow:0 0 8px 2px rgba(231,185,109,0.55);
    opacity:0;
    animation:drift 16s ease-in-out infinite;
  }
  .firefly:nth-child(1){left:8%; top:70%; animation-delay:0s; background:var(--gold);}
  .firefly:nth-child(2){left:80%; top:20%; animation-delay:3s; background:var(--mint); box-shadow:0 0 8px 2px rgba(127,209,164,0.5);}
  .firefly:nth-child(3){left:45%; top:85%; animation-delay:6s;}
  .firefly:nth-child(4){left:65%; top:55%; animation-delay:9s; background:var(--mint); box-shadow:0 0 8px 2px rgba(127,209,164,0.5);}
  .firefly:nth-child(5){left:20%; top:30%; animation-delay:12s;}
  .firefly:nth-child(6){left:90%; top:75%; animation-delay:2s; background:var(--lilac); box-shadow:0 0 8px 2px rgba(185,163,227,0.5);}
  .firefly:nth-child(7){left:30%; top:12%; animation-delay:8s; background:var(--lilac); box-shadow:0 0 8px 2px rgba(185,163,227,0.5);}
  .firefly:nth-child(8){left:55%; top:40%; animation-delay:14s;}

  @keyframes drift{
    0%{opacity:0; transform:translate(0,0) scale(0.8);}
    15%{opacity:0.9;}
    50%{opacity:0.4; transform:translate(24px,-40px) scale(1.1);}
    85%{opacity:0.8;}
    100%{opacity:0; transform:translate(-16px,-80px) scale(0.8);}
  }

  @media (prefers-reduced-motion: reduce){
    .firefly, .meadow-firefly{animation:none; opacity:0.3;}
    .star{animation:none; opacity:var(--max-o);}
    .shooting-star{display:none;}
  }

  /* ---------- name gate ---------- */
  #gate{
    position:fixed; inset:0; z-index:10;
    display:flex; align-items:center; justify-content:center;
    background:rgba(8,8,18,0.55);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    transition:opacity .5s ease;
  }
  #gate.hidden{opacity:0; pointer-events:none;}
  .gate-card{
    width:min(360px, 88vw);
    background:var(--surface-strong);
    border:1px solid var(--border);
    border-radius:24px;
    padding:36px 28px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
    animation:riseIn .6s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes riseIn{
    from{opacity:0; transform:translateY(18px) scale(0.98);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .gate-card h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:28px;
    margin:0 0 6px;
    letter-spacing:0.2px;
  }
  .gate-card p{
    color:var(--text-dim);
    font-size:14px;
    margin:0 0 24px;
  }
  #passwordInput{
    width:100%;
    padding:13px 16px;
    border-radius:12px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.05);
    color:var(--text);
    font-size:15px;
    font-family:inherit;
    outline:none;
    transition:border-color .2s ease, background .2s ease;
    letter-spacing:2px;
  }
  #passwordInput:focus{
    border-color:var(--gold);
    background:rgba(255,255,255,0.08);
  }
  #enterBtn{
    margin-top:14px;
    width:100%;
    padding:13px 16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg, var(--gold), #d99f4d);
    color:#241a0c;
    font-weight:600;
    font-size:15px;
    font-family:inherit;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  #enterBtn:hover{transform:translateY(-1px); box-shadow:0 8px 20px rgba(231,185,109,0.25);}
  #enterBtn:active{transform:translateY(0);}
  #enterBtn:focus-visible, #passwordInput:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
  #enterBtn:disabled{opacity:0.6; cursor:default; transform:none; box-shadow:none;}

  .gate-error{
    min-height:16px;
    margin:10px 0 0;
    font-size:12.5px;
    color:#e08a7d;
    opacity:0;
    transition:opacity .2s ease;
  }
  .gate-error.visible{opacity:1;}
  .gate-card.shake{ animation:shakeCard .4s ease; }
  @keyframes shakeCard{
    0%, 100%{ transform:translateX(0); }
    20%{ transform:translateX(-8px); }
    40%{ transform:translateX(7px); }
    60%{ transform:translateX(-5px); }
    80%{ transform:translateX(3px); }
  }

  /* ---------- chat shell ---------- */
  #app{
    position:relative; z-index:1;
    height:100vh;
    display:flex; flex-direction:column;
    max-width:640px;
    margin:0 auto;
  }
  header{
    padding:18px 20px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border);
    background:rgba(255,255,255,0.02);
    backdrop-filter:blur(6px);
  }
  header .title{
    display:flex; flex-direction:column; gap:2px;
  }
  header h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size:20px;
    margin:0;
  }
  .presence{
    display:flex; align-items:center; gap:6px;
    font-size:12.5px;
    color:var(--text-dim);
  }
  .dot{
    width:7px; height:7px; border-radius:50%;
    background:var(--mint);
    box-shadow:0 0 6px 1px rgba(127,209,164,0.7);
    animation:pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1; transform:scale(1);}
    50%{opacity:0.55; transform:scale(0.8);}
  }

  #messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
    scroll-behavior:smooth;
  }
  #messages::-webkit-scrollbar{width:6px;}
  #messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12); border-radius:6px;}

  .bubble-row{
    display:flex;
    animation:pop .28s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes pop{
    from{opacity:0; transform:translateY(8px) scale(0.97);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .bubble-row.mine{justify-content:flex-end;}
  .bubble-row.theirs{justify-content:flex-start;}

  .bubble{
    max-width:75%;
    padding:10px 14px;
    border-radius:var(--radius);
    font-size:14.5px;
    line-height:1.45;
    position:relative;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
  }
  .bubble .meta{
    display:block;
    font-size:11px;
    margin-bottom:3px;
    opacity:0.7;
    font-weight:500;
  }
  .bubble .time{
    display:block;
    font-size:10px;
    margin-top:4px;
    opacity:0.55;
    text-align:right;
  }
  .seen-label{
    display:block;
    font-size:10px;
    margin-top:2px;
    text-align:right;
    color:var(--text-dim);
    opacity:0.9;
    animation:pop .25s ease;
  }

  .theirs .bubble{
    background:var(--surface);
    border:1px solid var(--border);
    border-bottom-left-radius:6px;
  }
  .mine .bubble{
    background:linear-gradient(135deg, color-mix(in srgb, var(--gold) 92%, white), color-mix(in srgb, var(--gold) 70%, black));
    color:#241a0c;
    border-bottom-right-radius:6px;
  }
  .mine .bubble .meta{display:none;}

  /* ---------- quoted reply preview inside a bubble ---------- */
  .quote{
    display:block;
    padding:6px 10px;
    margin-bottom:6px;
    border-left:2px solid var(--mint);
    border-radius:6px;
    background:rgba(0,0,0,0.18);
    font-size:12.5px;
    line-height:1.35;
    cursor:pointer;
    opacity:0.85;
  }
  .mine .quote{
    border-left-color:#7a5a22;
    background:rgba(0,0,0,0.10);
  }
  .quote .quote-name{
    display:block;
    font-weight:600;
    font-size:11px;
    margin-bottom:1px;
  }
  .quote .quote-text{
    display:block;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:220px;
  }

  .bubble-row.flash .bubble{
    animation:flashHighlight 1s ease;
  }
  @keyframes flashHighlight{
    0%{box-shadow:0 0 0 2px var(--mint);}
    100%{box-shadow:0 4px 14px rgba(0,0,0,0.25);}
  }

  /* ---------- action icons under each bubble ---------- */
  .actions{
    display:flex;
    gap:10px;
    margin-top:3px;
    padding:0 2px;
  }
  .mine .actions{justify-content:flex-end;}
  .theirs .actions{justify-content:flex-start;}
  .action-btn{
    background:none;
    border:none;
    padding:2px;
    color:var(--text-dim);
    opacity:0.5;
    cursor:pointer;
    display:flex;
    align-items:center;
    transition:opacity .15s ease, color .15s ease, transform .15s ease;
  }
  .action-btn:hover{opacity:1; color:var(--mint); transform:translateY(-1px);}
  .action-btn.delete-btn:hover{color:#e08a7d;}
  .action-btn:focus-visible{outline:2px solid var(--mint); outline-offset:2px; opacity:1;}

  /* ---------- reply bar above composer ---------- */
  #replyBar{
    display:none;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:9px 14px;
    margin:0 20px;
    border-radius:12px 12px 0 0;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    border-bottom:none;
    animation:riseIn .25s ease;
  }
  #replyBar.visible{display:flex;}
  #replyBar .reply-info{
    min-width:0;
    font-size:12.5px;
    color:var(--text-dim);
  }
  #replyBar .reply-info b{
    color:var(--gold);
    font-weight:600;
  }
  #replyBar .reply-info span{
    display:block;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  #replyCancel{
    background:none;
    border:none;
    color:var(--text-dim);
    font-size:18px;
    line-height:1;
    cursor:pointer;
    padding:2px 6px;
    flex-shrink:0;
  }
  #replyCancel:hover{color:var(--text);}

  form#composer{
    display:flex;
    gap:10px;
    padding:16px 20px 20px;
    border-top:1px solid var(--border);
    background:rgba(255,255,255,0.02);
  }
  #textInput{
    flex:1;
    padding:12px 16px;
    border-radius:14px;
    border:1px solid var(--border);
    background:rgba(255,255,255,0.05);
    color:var(--text);
    font-size:14.5px;
    font-family:inherit;
    outline:none;
    transition:border-color .2s ease, background .2s ease;
  }
  #textInput:focus{border-color:var(--lilac); background:rgba(255,255,255,0.08);}
  #sendBtn{
    width:46px; height:46px;
    border-radius:14px;
    border:none;
    background:linear-gradient(135deg, var(--lilac), #8f76c9);
    color:#1c1730;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:transform .15s ease, box-shadow .15s ease;
    flex-shrink:0;
  }
  #sendBtn:hover{transform:translateY(-1px) scale(1.03); box-shadow:0 8px 18px rgba(185,163,227,0.35);}
  #sendBtn:active{transform:translateY(0) scale(0.97);}
  #sendBtn:focus-visible{outline:2px solid var(--lilac); outline-offset:2px;}
  #textInput:focus-visible{outline:2px solid var(--lilac); outline-offset:2px;}

  .empty-state{
    margin:auto;
    text-align:center;
    color:var(--text-dim);
    font-size:14px;
    padding:40px 20px;
  }
  .empty-state span{
    display:block;
    font-family:'Fraunces', serif;
    font-size:19px;
    color:var(--text);
    margin-bottom:6px;
  }

  /* ---------- emoji-only messages render larger ---------- */
  .bubble .msg-text.emoji-only{
    line-height:1.2;
  }
  .bubble .msg-text.emoji-size-lg{ font-size:2.6em; }
  .bubble .msg-text.emoji-size-md{ font-size:2em; }
  .bubble .msg-text.emoji-size-sm{ font-size:1.5em; }

  @media (max-width:480px){
    header{padding:14px 16px;}
    #messages{padding:16px;}
    form#composer{padding:12px 16px 16px;}
  }
</style>
</head>
<body>

<div id="scenery"></div>

<div class="fireflies">
  <div class="firefly"></div>
  <div class="firefly"></div>
  <div class="firefly"></div>
  <div class="firefly"></div>
  <div class="firefly"></div>
  <div class="firefly"></div>
  <div class="firefly"></div>
  <div class="firefly"></div>
</div>

<div id="gate">
  <div class="gate-card">
    <h1>Nightline</h1>
    <p>A quiet room for people who already know each other. Enter the password to step in.</p>
    <form id="gateForm" autocomplete="off">
      <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password" />
      <p id="gateError" class="gate-error"></p>
      <button id="enterBtn" type="submit">
        <span id="enterBtnLabel">Enter room</span>
      </button>
    </form>
  </div>
</div>

<div id="app">
  <header>
    <div class="title">
      <h1>Nightline</h1>
    </div>
    <div class="presence"><span class="dot"></span><span id="presenceCount">connecting…</span></div>
  </header>

  <div id="messages">
    <div class="empty-state" id="emptyState">
      <span>It's quiet in here</span>
      Say something to get the conversation started.
    </div>
  </div>

  <div id="replyBar">
    <div class="reply-info">
      <b>Replying to <span id="replyName"></span></b>
      <span id="replyText"></span>
    </div>
    <button id="replyCancel" type="button" aria-label="Cancel reply">×</button>
  </div>

  <form id="composer" autocomplete="off">
    <input id="textInput" type="text" placeholder="Write a message…" maxlength="500" />
    <button id="sendBtn" type="submit" aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M4 12L20 4L13 20L11 13L4 12Z" fill="currentColor"/>
      </svg>
    </button>
  </form>
</div>

<script>
  // ================= SCENERY BUILDER =================
  // Only builds the DOM for whichever theme was chosen in <head>, so the
  // other two themes cost nothing this session. Everything below uses
  // plain CSS transforms/opacity (GPU-composited) and no network requests,
  // images, or timers heavier than a handful of setTimeouts.
  (function(){
    var theme = document.documentElement.getAttribute('data-theme') || 'dusk';
    var field = document.getElementById('scenery');
    var prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    if(theme === 'nightsky'){
      buildNightsky();
    } else if(theme === 'meadow'){
      buildMeadow();
    }
    // 'dusk' needs no extra scenery — the CSS gradients + shared fireflies
    // already recreate the original room.

    function buildNightsky(){
      var moon = document.createElement('div');
      moon.className = 'moon-glow';
      field.appendChild(moon);

      var count = window.innerWidth < 480 ? 70 : 120;
      var accents = ['#fdfbf3', '#fdfbf3', '#fdfbf3', '#f0c987', '#8fe3c0', '#b9a3e3'];
      for(var i = 0; i < count; i++){
        var star = document.createElement('div');
        star.className = 'star';
        var size = (Math.random() * 1.6 + 0.6).toFixed(2);
        var minO = (Math.random() * 0.25 + 0.15).toFixed(2);
        var maxO = (Math.random() * 0.4 + 0.6).toFixed(2);
        var color = accents[Math.floor(Math.random() * accents.length)];
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.top = (Math.random() * 100).toFixed(2) + '%';
        star.style.left = (Math.random() * 100).toFixed(2) + '%';
        star.style.background = color;
        star.style.setProperty('--min-o', minO);
        star.style.setProperty('--max-o', maxO);
        if(color !== '#fdfbf3'){
          star.style.boxShadow = '0 0 4px 1px ' + color + '88';
        }
        if(!prefersReduced){
          star.style.animationDuration = (Math.random() * 3 + 2.5).toFixed(2) + 's';
          star.style.animationDelay = (Math.random() * 5).toFixed(2) + 's';
        } else {
          star.style.opacity = maxO;
        }
        field.appendChild(star);
      }

      // Fully randomized shooting stars: each one gets its own random
      // start point, direction, length, speed and lifetime, and the next
      // one is only scheduled after this one finishes — so no two ever
      // look alike and there's never more than a couple alive at once.
      if(!prefersReduced){
        scheduleShootingStar();
      }

      function scheduleShootingStar(){
        var delay = 2500 + Math.random() * 6500;
        setTimeout(function(){
          spawnShootingStar();
          scheduleShootingStar();
        }, delay);
      }

      function spawnShootingStar(){
        var el = document.createElement('div');
        el.className = 'shooting-star';
        var startTop = Math.random() * 55;
        var startLeft = Math.random() * 90;
        var angle = 15 + Math.random() * 50; // degrees, downward-left travel
        var length = 70 + Math.random() * 90;
        var travel = 180 + Math.random() * 160;
        var duration = 1.6 + Math.random() * 2.4;
        var rad = angle * Math.PI / 180;
        el.style.top = startTop + '%';
        el.style.left = startLeft + '%';
        el.style.width = length + 'px';
        el.style.transform = 'rotate(' + angle + 'deg)';
        field.appendChild(el);

        var dx = -Math.cos(rad) * travel;
        var dy = Math.sin(rad) * travel;
        var anim = el.animate([
          { transform: 'rotate(' + angle + 'deg) translateX(0)', opacity: 0 },
          { opacity: 1, offset: 0.08 },
          { opacity: 1, offset: 0.55 },
          { transform: 'rotate(' + angle + 'deg) translateX(-' + travel + 'px)', opacity: 0 }
        ], { duration: duration * 1000, easing: 'ease-in' });
        anim.onfinish = function(){ el.remove(); };
        // keep dx/dy referenced for potential future path variation
        void dx; void dy;
      }
    }

    function buildMeadow(){
      var moon = document.createElement('div');
      moon.className = 'meadow-moon';
      field.appendChild(moon);

      field.appendChild(svgLayer('mountain-layer mountain-far',
        '#1c2b3a',
        '0,100 0,60 40,20 80,55 130,15 180,50 230,10 280,48 330,22 380,45 400,30 400,100'));

      field.appendChild(svgLayer('mountain-layer mountain-near',
        '#0e1a22',
        '0,100 0,50 60,10 130,45 200,5 270,40 340,12 400,35 400,100'));

      field.appendChild(svgLayer('grass-layer',
        '#0a1410',
        '0,100 0,70 10,40 20,65 30,38 40,68 50,35 60,66 70,42 80,70 90,37 100,64 ' +
        '110,40 120,69 130,36 140,65 150,41 160,70 170,38 180,66 190,43 200,70 ' +
        '210,37 220,68 230,40 240,65 250,42 260,70 270,38 280,66 290,41 300,69 ' +
        '310,36 320,65 330,42 340,70 350,38 360,66 370,41 380,69 390,37 400,100'));

      // A handful of low, dim fireflies hovering in the grass, in addition
      // to the shared .fireflies layer already floating higher up.
      var lowCount = 9;
      for(var i = 0; i < lowCount; i++){
        var f = document.createElement('div');
        f.className = 'meadow-firefly';
        var size = (Math.random() * 2 + 2.5).toFixed(1);
        f.style.width = size + 'px';
        f.style.height = size + 'px';
        f.style.left = (Math.random() * 96 + 2).toFixed(2) + '%';
        f.style.top = (Math.random() * 12 + 84).toFixed(2) + '%';
        var colors = ['var(--gold)', 'var(--mint)'];
        f.style.background = colors[Math.floor(Math.random() * colors.length)];
        f.style.boxShadow = '0 0 6px 2px rgba(227,181,106,0.4)';
        if(!prefersReduced){
          f.style.animationDuration = (10 + Math.random() * 8).toFixed(1) + 's';
          f.style.animationDelay = (Math.random() * 12).toFixed(1) + 's';
        } else {
          f.style.opacity = 0.35;
        }
        field.appendChild(f);
      }
    }

    function svgLayer(className, fill, points){
      var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('class', className);
      svg.setAttribute('viewBox', '0 0 400 100');
      svg.setAttribute('preserveAspectRatio', 'none');
      svg.setAttribute('width', '100%');
      svg.setAttribute('height', '100%');
      var poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      poly.setAttribute('points', points);
      poly.setAttribute('fill', fill);
      svg.appendChild(poly);
      return svg;
    }
  })();
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getDatabase, ref, push, onChildAdded, onChildRemoved, onValue,
    onDisconnect, set, remove, get, query, orderByKey, startAfter, limitToLast
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  import {
    getAuth, setPersistence, browserSessionPersistence,
    signInWithEmailAndPassword, onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC6AvlanqU86iOQWyuR6QXXk0CdSzZFPiM",
    authDomain: "texting-8b194.firebaseapp.com",
    databaseURL: "https://texting-8b194-default-rtdb.firebaseio.com",
    projectId: "texting-8b194",
    storageBucket: "texting-8b194.firebasestorage.app",
    messagingSenderId: "167982646334",
    appId: "1:167982646334:web:ddcea857eab0ceb62d7d6f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // Password -> the Firebase account it silently signs in as, and the
  // display name that account shows up as in chat. The user only ever
  // sees/types the plain password on the left; everything else is
  // handled behind the scenes.
  const ACCOUNTS = {
    'Howiswatura':  { email: 'methinkingcrazy@gmail.com', displayName: 'Ashriel' },
    'Waturaisgood': { email: 'newannimsitha3@gmail.com',  displayName: 'Watura'  }
  };
  // Reverse lookup so a page refresh (still signed in this tab) can figure
  // out the right display name from the restored Firebase session alone.
  const EMAIL_TO_NAME = Object.fromEntries(
    Object.values(ACCOUNTS).map(a => [a.email, a.displayName])
  );

  const gate = document.getElementById('gate');
  const gateCard = document.querySelector('.gate-card');
  const gateForm = document.getElementById('gateForm');
  const passwordInput = document.getElementById('passwordInput');
  const gateError = document.getElementById('gateError');
  const enterBtn = document.getElementById('enterBtn');
  const enterBtnLabel = document.getElementById('enterBtnLabel');
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('emptyState');
  const composer = document.getElementById('composer');
  const textInput = document.getElementById('textInput');
  const presenceCount = document.getElementById('presenceCount');
  const replyBar = document.getElementById('replyBar');
  const replyName = document.getElementById('replyName');
  const replyTextEl = document.getElementById('replyText');
  const replyCancel = document.getElementById('replyCancel');
  let myName = '';
  let replyingTo = null; // { key, name, text }
  let myPresenceKey = null;
  let latestMessageKey = null;
  const loadedKeys = new Set();
  let presenceMap = {};

  function setReplyingTo(entry){
    replyingTo = entry;
    if(entry){
      replyName.textContent = entry.name;
      replyTextEl.textContent = entry.text;
      replyBar.classList.add('visible');
      textInput.focus();
    } else {
      replyBar.classList.remove('visible');
    }
  }
  replyCancel.addEventListener('click', () => setReplyingTo(null));

  function showGateError(message){
    gateError.textContent = message;
    gateError.classList.add('visible');
    gateCard.classList.remove('shake');
    void gateCard.offsetWidth; // restart animation
    gateCard.classList.add('shake');
  }

  function setGateBusy(busy){
    enterBtn.disabled = busy;
    passwordInput.disabled = busy;
    enterBtnLabel.textContent = busy ? 'Checking…' : 'Enter room';
  }

  // Session persistence: the auth session lives for as long as this tab/
  // browser stays open, and is cleared automatically when it's closed —
  // so next visit always needs the password again.
  setPersistence(auth, browserSessionPersistence).catch(() => {});

  gateForm.addEventListener('submit', async e => {
    e.preventDefault();
    const entered = passwordInput.value;
    const account = ACCOUNTS[entered];
    if(!account){
      showGateError('That password isn\u2019t recognized.');
      return;
    }
    setGateBusy(true);
    gateError.classList.remove('visible');
    try {
      await signInWithEmailAndPassword(auth, account.email, entered);
      // onAuthStateChanged (below) takes it from here: sets myName and
      // opens the chat once Firebase confirms the session.
    } catch (err) {
      setGateBusy(false);
      showGateError('That password isn\u2019t recognized.');
    }
  });
  passwordInput.focus();

  // Fires on initial sign-in AND automatically if a session from earlier
  // in this same tab is restored on refresh — either way it's the single
  // place that opens the chat.
  onAuthStateChanged(auth, user => {
    if(!user){
      return;
    }
    const displayName = EMAIL_TO_NAME[user.email];
    if(!displayName){
      // Some other/unexpected account got signed in somehow — don't let it
      // into the room.
      signOut(auth);
      return;
    }
    myName = displayName;
    gate.classList.add('hidden');
    startChat();
  });

  let started = false;
  async function startChat(){
    if(started) return;
    started = true;

    // ---- presence ----
    // Keyed by the authenticated user's Firebase UID rather than a random
    // per-tab id. Since each of the two people has one fixed account, a
    // reconnect (tab backgrounded, brief network blip, phone sleeping,
    // etc.) always re-arms onDisconnect and rewrites that SAME uid node —
    // so a duplicate "online" entry for the same person can't exist, and
    // refreshing the page doesn't spawn a second one either.
    myPresenceKey = auth.currentUser.uid;
    const myPresenceRef = ref(db, `presence/${myPresenceKey}`);

    onValue(ref(db, '.info/connected'), snap => {
      if(snap.val() !== true) return;
      onDisconnect(myPresenceRef).remove().then(() => {
        set(myPresenceRef, { name: myName, lastSeen: latestMessageKey || null });
        updateMySeen();
      });
    });

    onValue(ref(db, 'presence'), snap => {
      const val = snap.exists() ? snap.val() : {};
      presenceMap = val;
      const count = Object.keys(val).length;
      presenceCount.textContent = count === 1 ? '1 person online' : `${count} people online`;
      refreshSeenLabel();
    });

    document.addEventListener('visibilitychange', updateMySeen);
    window.addEventListener('focus', updateMySeen);

    // ---- initial batch: one-time read of the most recent 150 messages ----
    const initialSnap = await get(query(ref(db, 'messages'), limitToLast(150)));
    const initialEntries = [];
    initialSnap.forEach(child => initialEntries.push([child.key, child.val()]));

    initialEntries.forEach(([key, msg]) => {
      if(!msg || !msg.text) return;
      loadedKeys.add(key);
      renderMessage(key, msg);
    });

    if(initialEntries.length){
      emptyState.remove();
      latestMessageKey = initialEntries[initialEntries.length - 1][0];
    }
    messagesEl.scrollTop = messagesEl.scrollHeight;
    updateMySeen();
    refreshSeenLabel();

    // ---- live listener: only messages sent from now on ----
    const liveQuery = latestMessageKey
      ? query(ref(db, 'messages'), orderByKey(), startAfter(latestMessageKey))
      : ref(db, 'messages');

    onChildAdded(liveQuery, snap => {
      if(loadedKeys.has(snap.key)) return;
      const msg = snap.val();
      if(!msg || !msg.text) return;
      emptyState.remove();
      loadedKeys.add(snap.key);
      renderMessage(snap.key, msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      latestMessageKey = snap.key;
      updateMySeen();
      refreshSeenLabel();
    });

    onChildRemoved(ref(db, 'messages'), snap => {
      loadedKeys.delete(snap.key);
      const row = messagesEl.querySelector(`[data-key="${snap.key}"]`);
      if(row) row.remove();
      if(!messagesEl.querySelector('.bubble-row')){
        messagesEl.appendChild(emptyState);
      }
      refreshSeenLabel();
    });

    composer.addEventListener('submit', e => {
      e.preventDefault();
      const text = textInput.value.trim();
      if(!text) return;
      const payload = {
        name: myName,
        text,
        ts: Date.now()
      };
      if(replyingTo){
        payload.replyTo = {
          key: replyingTo.key,
          name: replyingTo.name,
          text: replyingTo.text
        };
      }
      push(ref(db, 'messages'), payload);
      textInput.value = '';
      setReplyingTo(null);
      textInput.focus();
    });
  }

  function deleteMessage(key){
    remove(ref(db, `messages/${key}`));
  }

  function updateMySeen(){
    if(!myPresenceKey || !latestMessageKey || document.hidden) return;
    set(ref(db, `presence/${myPresenceKey}/lastSeen`), latestMessageKey);
  }

  function refreshSeenLabel(){
    const mineRows = messagesEl.querySelectorAll('.bubble-row.mine');
    mineRows.forEach(r => r.querySelector('.seen-label')?.remove());
    if(mineRows.length === 0) return;
    const lastRow = mineRows[mineRows.length - 1];
    const key = lastRow.dataset.key;
    const seenByOther = Object.entries(presenceMap).some(([pk, val]) => {
      return pk !== myPresenceKey && val && val.name !== myName && val.lastSeen && val.lastSeen >= key;
    });
    if(seenByOther){
      const label = document.createElement('span');
      label.className = 'seen-label';
      label.textContent = 'Seen';
      lastRow.querySelector('.bubble').appendChild(label);
    }
  }

  function jumpToMessage(key){
    const row = messagesEl.querySelector(`[data-key="${key}"]`);
    if(!row) return;
    row.scrollIntoView({behavior:'smooth', block:'center'});
    row.classList.remove('flash');
    void row.offsetWidth; // restart animation
    row.classList.add('flash');
  }

  function renderMessage(key, msg){
    const row = buildMessageRow(key, msg);
    messagesEl.appendChild(row);
  }

  const EMOJI_ONLY_RE = /^\p{Extended_Pictographic}+$/u;

  function isEmojiOnly(text){
    if(!text) return false;
    // strip variation selectors, zero-width joiners, and whitespace before testing
    const stripped = text.replace(/[\u200d\ufe0f\s]/g, '');
    if(!stripped) return false;
    return EMOJI_ONLY_RE.test(stripped);
  }

  function graphemeCount(text){
    if(typeof Intl !== 'undefined' && Intl.Segmenter){
      const seg = new Intl.Segmenter(undefined, { granularity: 'grapheme' });
      return [...seg.segment(text.trim())].length;
    }
    return [...text.trim()].length;
  }

  function buildMessageRow(key, msg){
    const isMine = msg.name === myName;
    const row = document.createElement('div');
    row.className = 'bubble-row ' + (isMine ? 'mine' : 'theirs');
    row.dataset.key = key;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if(msg.replyTo){
      const quote = document.createElement('div');
      quote.className = 'quote';
      const qName = document.createElement('span');
      qName.className = 'quote-name';
      qName.textContent = msg.replyTo.name;
      const qText = document.createElement('span');
      qText.className = 'quote-text';
      qText.textContent = msg.replyTo.text;
      quote.appendChild(qName);
      quote.appendChild(qText);
      quote.addEventListener('click', () => jumpToMessage(msg.replyTo.key));
      bubble.appendChild(quote);
    }

    const meta = document.createElement('span');
    meta.className = 'meta';
    meta.textContent = msg.name || 'Someone';

    const text = document.createElement('div');
    text.className = 'msg-text';
    text.textContent = msg.text;
    if(isEmojiOnly(msg.text)){
      const count = graphemeCount(msg.text);
      text.classList.add('emoji-only');
      if(count <= 3) text.classList.add('emoji-size-lg');
      else if(count <= 6) text.classList.add('emoji-size-md');
      else text.classList.add('emoji-size-sm');
    }

    const time = document.createElement('span');
    time.className = 'time';
    const d = msg.ts ? new Date(msg.ts) : new Date();
    time.textContent = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    bubble.appendChild(meta);
    bubble.appendChild(text);
    bubble.appendChild(time);
    row.appendChild(bubble);

    const actions = document.createElement('div');
    actions.className = 'actions';

    const replyBtn = document.createElement('button');
    replyBtn.type = 'button';
    replyBtn.className = 'action-btn';
    replyBtn.setAttribute('aria-label', 'Reply');
    replyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 17L4 12L9 7M4 12H14C17.3137 12 20 14.6863 20 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    replyBtn.addEventListener('click', () => setReplyingTo({ key, name: msg.name, text: msg.text }));
    actions.appendChild(replyBtn);

    if(isMine){
      const delBtn = document.createElement('button');
      delBtn.type = 'button';
      delBtn.className = 'action-btn delete-btn';
      delBtn.setAttribute('aria-label', 'Delete message');
      delBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 7H20M9 7V4H15V7M6 7L7 20H17L18 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      delBtn.addEventListener('click', () => deleteMessage(key));
      actions.appendChild(delBtn);
    }

    row.appendChild(actions);
    return row;
  }
</script>
